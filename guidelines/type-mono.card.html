<!-- @dsCard group="Type" viewport="700x180" name="JetBrains Mono — the labelling voice" subtitle="Eyebrows, data and section markers — uppercase and tracked" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page)}
  .wrap{padding:26px 30px;font-family:var(--font-mono)}
  .spec{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);display:block;margin-bottom:8px}
  .item{margin-bottom:16px}
  .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
  .num{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-primary)}
  .data{font-size:13px;letter-spacing:.06em;color:var(--text-secondary)}
</style></head>
<body>
<div class="wrap">
  <div class="item"><span class="spec">Eyebrow · 11 · .1em</span><div class="eyebrow">Component Library / v0.1 / 2026</div></div>
  <div class="item"><span class="spec">Section marker · 11 · .12em</span><div class="num">01 — Buttons</div></div>
  <div class="item" style="margin-bottom:0"><span class="spec">Data · 13 · .06em</span><div class="data">2026 · Branding · Live</div></div>
</div>
</body></html>
