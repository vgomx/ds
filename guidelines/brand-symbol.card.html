<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page)}
  .wrap{display:flex;gap:0;align-items:stretch;height:200px}
  .pane{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .pane svg{width:88px;height:auto;display:block}
  .cap{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase}
</style></head>
<body>
<div class="wrap">
  <div class="pane" style="background:var(--paper);border-right:1px solid var(--border-hairline)">
    <svg viewBox="0 0 562 369" style="fill:var(--ink-900);fill-rule:evenodd;clip-rule:evenodd"><g transform="matrix(1,0,0,1,-696,73)"><g transform="matrix(8.693433,0,0,8.693433,-7671.335362,-8770.706084)"><g transform="matrix(1,0,0,1,994.8125,1002.9085)"><path d="M0,37.612L31.187,18.993L31.187,18.619L0,0L-31.187,18.619L-31.187,18.993L0,37.612ZM0,32.004L-22.105,18.806L0,5.609L22.105,18.806L0,32.004Z"></path></g><g transform="matrix(1,0,0,1,1008.8203,1021.5751)"><path d="M0,0.169L0,0L-14.077,-8.404L-28.154,0L-28.154,0.169L-14.077,8.573L0,0.169Z"></path></g></g></g></svg>
    <span class="cap" style="color:var(--text-faint)">Ink on paper</span>
  </div>
  <div class="pane" style="background:var(--ink-900)">
    <svg viewBox="0 0 562 369" style="fill:var(--paper);fill-rule:evenodd;clip-rule:evenodd"><g transform="matrix(1,0,0,1,-696,73)"><g transform="matrix(8.693433,0,0,8.693433,-7671.335362,-8770.706084)"><g transform="matrix(1,0,0,1,994.8125,1002.9085)"><path d="M0,37.612L31.187,18.993L31.187,18.619L0,0L-31.187,18.619L-31.187,18.993L0,37.612ZM0,32.004L-22.105,18.806L0,5.609L22.105,18.806L0,32.004Z"></path></g><g transform="matrix(1,0,0,1,1008.8203,1021.5751)"><path d="M0,0.169L0,0L-14.077,-8.404L-28.154,0L-28.154,0.169L-14.077,8.573L0,0.169Z"></path></g></g></g></svg>
    <span class="cap" style="color:var(--text-inverse-faint)">Paper on ink</span>
  </div>
</div>
</body></html>
