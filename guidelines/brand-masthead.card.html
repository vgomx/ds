<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page)}
  .wrap{padding:34px 40px}
  .mast{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--ink-900);padding-bottom:14px}
  .mono{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .foot{display:flex;align-items:center;gap:12px;margin-top:22px}
  .foot svg{width:30px;height:auto;display:block;fill:var(--ink-900)}
</style></head>
<body>
<div class="wrap">
  <div class="mast">
    <span class="mono" style="color:var(--ink-900)">Vitor Gomes</span>
    <span class="mono" style="color:var(--text-muted)">Component Library / v0.1 / 2026</span>
  </div>
  <div class="foot">
    <svg viewBox="0 0 562 369" style="fill-rule:evenodd;clip-rule:evenodd"><g transform="matrix(1,0,0,1,-696,73)"><g transform="matrix(8.693433,0,0,8.693433,-7671.335362,-8770.706084)"><g transform="matrix(1,0,0,1,994.8125,1002.9085)"><path d="M0,37.612L31.187,18.993L31.187,18.619L0,0L-31.187,18.619L-31.187,18.993L0,37.612ZM0,32.004L-22.105,18.806L0,5.609L22.105,18.806L0,32.004Z"></path></g><g transform="matrix(1,0,0,1,1008.8203,1021.5751)"><path d="M0,0.169L0,0L-14.077,-8.404L-28.154,0L-28.154,0.169L-14.077,8.573L0,0.169Z"></path></g></g></g></svg>
    <span class="mono" style="color:var(--text-secondary)">Vitor Gomes · Product Designer</span>
  </div>
</div>
</body></html>
