<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page)}
  .wrap{font-family:var(--font-mono);padding:26px 28px;display:flex;gap:12px;flex-wrap:wrap}
  .chip{height:58px;min-width:130px;flex:1;border-radius:2px;display:flex;align-items:flex-end;padding:7px;box-sizing:border-box;font-size:9px;letter-spacing:.04em}
</style></head>
<body>
<div class="wrap">
  <div class="chip" style="background:#a33a2e;color:#fafafa">danger · #A33A2E</div>
  <div class="chip" style="background:#141416;color:#e0816f">danger on-dark · #E0816F</div>
  <div class="chip" style="background:#f4f4f5;color:#54545a">subtle fill · #F4F4F5</div>
  <div class="chip" style="background:#141416;color:#fafafa">scrim base · #141416 / 55%</div>
</div>
</body></html>
