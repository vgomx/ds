<!-- @dsCard group="Components" viewport="700x620" name="Data — Cards, Stats, Table" subtitle="Surfaces, figures and the index table" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  .wrap { font-family: var(--font-sans); color: var(--text-primary); padding: 28px 30px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 12px; }
  .block { margin-bottom: 26px; }
  h3 { font-size: 18px; font-weight: 600; letter-spacing: -.01em; margin: 12px 0 8px; }
  p { font-size: 14px; line-height: 1.55; color: var(--text-secondary); margin: 0; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
  const { Card, StatCard, Table, Tag, Badge } = window.VitorGomesDesignSystem_32625a;

  const rows = [
    { id: 1, name: 'Video platform identity', discipline: 'Branding', year: '2026', status: 'live', statusLabel: 'Live' },
    { id: 2, name: 'Internet brand facelift', discipline: 'UX / UI', year: '2025', status: 'draft', statusLabel: 'Draft' },
    { id: 3, name: 'Kitchen appliance campaign', discipline: 'Visual Design', year: '2024', status: 'archived', statusLabel: 'Archived' },
  ];

  function Demo() {
    return (
      <React.Fragment>
        <div className="block">
          <div className="lbl">Cards</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 20, alignItems: 'start' }}>
            <Card>
              <div style={{ display: 'flex', gap: 8, marginBottom: 6 }}>
                <Tag size="sm">Case Study</Tag><Tag size="sm">Visual Design</Tag>
              </div>
              <h3 style={{ fontSize: 22 }}>A visual identity for a video platform</h3>
              <p>Brand, motion and a flexible system for a hosting product finding its voice.</p>
            </Card>
            <Card tone="ink"><StatCard value="12+" label="Years shipping product" onDark /></Card>
          </div>
        </div>

        <div className="block">
          <div className="lbl">Index table</div>
          <Table
            columns={[
              { key: 'name', header: 'Project', width: '2.4fr', strong: true },
              { key: 'discipline', header: 'Discipline', width: '1.4fr', muted: true },
              { key: 'year', header: 'Year', width: '1fr', mono: true, muted: true },
              { key: 'status', header: 'Status', width: '0.8fr', align: 'right',
                render: (r) => <Badge status={r.status}>{r.statusLabel}</Badge> },
            ]}
            rows={rows}
            rowKey={(r) => r.id}
            selectedKey={1}
          />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
