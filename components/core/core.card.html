<!-- @dsCard group="Components" viewport="700x560" name="Core — Buttons, Tags, Badges, Input" subtitle="Actions, labels, status and fields" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  .wrap { font-family: var(--font-sans); color: var(--text-primary); padding: 28px 30px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 12px; }
  .block { margin-bottom: 26px; }
  .dark { background: var(--surface-ink); padding: 20px 22px; border-radius: var(--radius); }
</style>
</head>
<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
  const { Button, Tag, Badge, Avatar, Input, SegmentedControl } = window.VitorGomesDesignSystem_32625a;
  const Lbl = ({ children }) => <div className="lbl">{children}</div>;

  function Demo() {
    const [tab, setTab] = React.useState('Work');
    return (
      <React.Fragment>
        <div className="block">
          <Lbl>Buttons</Lbl>
          <div className="row">
            <Button>Primary</Button>
            <Button variant="secondary">Secondary</Button>
            <Button variant="ghost">Ghost</Button>
            <Button variant="accent">Accent CTA</Button>
            <Button variant="danger">Delete</Button>
            <Button disabled>Disabled</Button>
          </div>
        </div>

        <div className="block">
          <Lbl>Tags &amp; status</Lbl>
          <div className="row">
            <Tag>Visual Design</Tag>
            <Tag tone="solid">Featured</Tag>
            <Tag tone="subtle">2026</Tag>
            <Badge status="live">Live</Badge>
            <Badge status="draft">Draft</Badge>
            <Badge status="archived">Archived</Badge>
          </div>
        </div>

        <div className="block">
          <Lbl>Fields &amp; control</Lbl>
          <div className="row" style={{ alignItems: 'flex-end' }}>
            <Input label="Email" placeholder="you@studio.com" wrapperStyle={{ width: 240 }} />
            <SegmentedControl options={['Work', 'About', 'Contact']} value={tab} onChange={setTab} />
            <Avatar name="Vitor Gomes" />
          </div>
        </div>

        <div className="block dark">
          <Lbl>On dark</Lbl>
          <div className="row" style={{ marginBottom: 0 }}>
            <Button variant="primary" style={{ background: 'var(--paper)', color: 'var(--ink-900)', borderColor: 'var(--paper)' }}>Primary</Button>
            <Tag onDark>Case Study</Tag>
            <Badge status="live" onDark>Live</Badge>
            <SegmentedControl options={['Recent', 'A–Z']} onDark />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
