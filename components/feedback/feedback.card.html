<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  .wrap { font-family: var(--font-sans); color: var(--text-primary); padding: 30px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; margin-bottom: 30px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
  const { ProgressBar, Spinner, Skeleton, Accordion } = window.VitorGomesDesignSystem_32625a;
  function Demo() {
    return (
      <React.Fragment>
        <div className="grid">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
            <div className="lbl" style={{ marginBottom: 0 }}>Progress &amp; loaders</div>
            <ProgressBar value={68} label="Upload" />
            <ProgressBar indeterminate label="Indeterminate" />
            <Spinner label="Loading…" />
          </div>
          <div>
            <div className="lbl">Skeleton</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, border: '1px solid var(--border-hairline)', padding: 22 }}>
              <Skeleton width="70%" />
              <Skeleton />
              <Skeleton width="88%" delay={0.1} />
              <Skeleton width="40%" delay={0.2} />
            </div>
          </div>
        </div>
        <div className="lbl">Accordion</div>
        <Accordion items={[
          { title: 'What do you work on?', content: 'Brand and product design for teams shaping new things — identity, interface and the systems that hold them together.' },
          { title: 'Where are you based?', content: 'Remote, working across time zones.' },
          { title: 'Do you take freelance?', content: 'Select projects, a couple of slots a quarter.' },
        ]} />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
